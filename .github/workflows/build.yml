name: Build Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.9"
  PYQT6_VERSION: "6.6.1"
  PYQT6_QT_VERSION: "6.6.1"
  PYQT6_WEBENGINE_VERSION: "6.6.0"
  PYQT6_WEBENGINE_QT_VERSION: "6.6.0"

jobs:
  # ============================================================
  # Windows: Nuitka (Python -> C -> 原生 exe，代码混淆保护)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: win-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: win-pip-

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka
          key: win-nuitka-${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install chardet charset-normalizer
          pip install "PyQt6==${{ env.PYQT6_VERSION }}" "PyQt6-Qt6==${{ env.PYQT6_QT_VERSION }}" "PyQt6-WebEngine==${{ env.PYQT6_WEBENGINE_VERSION }}" "PyQt6-WebEngine-Qt6==${{ env.PYQT6_WEBENGINE_QT_VERSION }}" --force-reinstall
          pip install nuitka ordered-set zstandard pillow

      - name: Convert PNG to ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('website/logo.png')
          img.save('app_icon.ico', format='ICO', sizes=[(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)])
          print('ICO icon created successfully')
          "

      - name: Build with Nuitka
        shell: cmd
        run: |
          python -m nuitka ^
            --onefile ^
            --enable-plugin=pyqt6 ^
            --assume-yes-for-downloads ^
            --remove-output ^
            --output-dir=dist ^
            --output-filename=自动表单填写工具-Windows.exe ^
            --windows-disable-console ^
            --windows-icon-from-ico=app_icon.ico ^
            --include-package=core ^
            --include-package=gui ^
            --include-package=database ^
            --include-module=config ^
            --include-package=requests ^
            --include-package=charset_normalizer ^
            --include-package=chardet ^
            --include-package=pymongo ^
            --include-package=mongoengine ^
            --include-package=dns ^
            --include-package=certifi ^
            --include-package=Crypto ^
            --include-package=jwt ^
            --include-package=openpyxl ^
            --include-package=dateutil ^
            --include-module=PyQt6.sip ^
            --include-module=dns.resolver ^
            --include-module=dns.rdatatype ^
            --include-module=dns.nameserver ^
            --include-module=Crypto.Cipher ^
            --include-module=Crypto.Cipher.AES ^
            --include-module=Crypto.Util.Padding ^
            --nofollow-import-to=tools ^
            --nofollow-import-to=scripts ^
            --nofollow-import-to=setuptools ^
            --nofollow-import-to=pip ^
            --nofollow-import-to=fastapi ^
            --nofollow-import-to=uvicorn ^
            main.py

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: Windows-App
          path: dist/自动表单填写工具-Windows.exe
          retention-days: 3

  # ============================================================
  # macOS Intel: Cython 预编译 + PyInstaller (代码保护)
  # ============================================================
  build-macos-intel:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "PyQt6==${{ env.PYQT6_VERSION }}" "PyQt6-Qt6==${{ env.PYQT6_QT_VERSION }}" "PyQt6-WebEngine==${{ env.PYQT6_WEBENGINE_VERSION }}" "PyQt6-WebEngine-Qt6==${{ env.PYQT6_WEBENGINE_QT_VERSION }}" --force-reinstall
          pip install pyinstaller cython setuptools

      - name: Cython pre-compile (code protection)
        run: |
          echo "=== Cython: .py -> .so native binary ==="
          python cython_protect.py

      - name: Generate hidden imports
        id: hidden
        run: |
          HIDDEN_IMPORTS=""
          if [ -f _hidden_imports.txt ]; then
            while IFS= read -r module; do
              HIDDEN_IMPORTS="$HIDDEN_IMPORTS --hidden-import=$module"
            done < _hidden_imports.txt
          fi
          echo "flags=$HIDDEN_IMPORTS" >> $GITHUB_OUTPUT

      - name: Create ICNS icon
        run: |
          mkdir -p app_icon.iconset
          sips -z 16 16     website/logo.png --out app_icon.iconset/icon_16x16.png
          sips -z 32 32     website/logo.png --out app_icon.iconset/icon_16x16@2x.png
          sips -z 32 32     website/logo.png --out app_icon.iconset/icon_32x32.png
          sips -z 64 64     website/logo.png --out app_icon.iconset/icon_32x32@2x.png
          sips -z 128 128   website/logo.png --out app_icon.iconset/icon_128x128.png
          sips -z 256 256   website/logo.png --out app_icon.iconset/icon_128x128@2x.png
          sips -z 256 256   website/logo.png --out app_icon.iconset/icon_256x256.png
          sips -z 512 512   website/logo.png --out app_icon.iconset/icon_256x256@2x.png
          sips -z 512 512   website/logo.png --out app_icon.iconset/icon_512x512.png
          sips -z 1024 1024 website/logo.png --out app_icon.iconset/icon_512x512@2x.png
          iconutil -c icns app_icon.iconset -o app_icon.icns
          echo "ICNS icon created successfully"

      - name: Verify Cython output
        run: |
          echo "=== Compiled .so files ==="
          find core gui database -name "*.so" 2>/dev/null || true
          echo "=== Remaining .py files ==="
          find core gui database -name "*.py" 2>/dev/null || true
          echo "=== config module ==="
          ls -la config* 2>/dev/null || true

      - name: Build macOS Intel App
        run: |
          pyinstaller --name="自动表单填写工具-Intel" --windowed --onedir --clean \
            --icon=app_icon.icns \
            --osx-bundle-identifier=com.autofill.app \
            --collect-all PyQt6 \
            --collect-all PyQt6-WebEngine \
            --collect-all requests \
            --collect-all charset_normalizer \
            --collect-all chardet \
            --collect-all certifi \
            --collect-all pymongo \
            --collect-all mongoengine \
            --collect-all dns \
            --hidden-import=PyQt6.sip \
            --hidden-import=charset_normalizer \
            --hidden-import=chardet \
            --hidden-import=dns.resolver \
            --hidden-import=dns.rdatatype \
            --hidden-import=dns.nameserver \
            --hidden-import=Crypto \
            --hidden-import=Crypto.Cipher \
            ${{ steps.hidden.outputs.flags }} \
            main.py

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R "dist/自动表单填写工具-Intel.app" dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "自动表单填写工具-Intel" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "dist/自动表单填写工具-Intel.dmg"

      - name: Upload macOS Intel Build
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Intel-App
          path: dist/自动表单填写工具-Intel.dmg
          retention-days: 3

  # ============================================================
  # macOS ARM: Cython 预编译 + PyInstaller (代码保护)
  # ============================================================
  build-macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "PyQt6==${{ env.PYQT6_VERSION }}" "PyQt6-Qt6==${{ env.PYQT6_QT_VERSION }}" "PyQt6-WebEngine==${{ env.PYQT6_WEBENGINE_VERSION }}" "PyQt6-WebEngine-Qt6==${{ env.PYQT6_WEBENGINE_QT_VERSION }}" --force-reinstall
          pip install pyinstaller cython setuptools

      - name: Cython pre-compile (code protection)
        run: |
          echo "=== Cython: .py -> .so native binary ==="
          python cython_protect.py

      - name: Generate hidden imports
        id: hidden
        run: |
          HIDDEN_IMPORTS=""
          if [ -f _hidden_imports.txt ]; then
            while IFS= read -r module; do
              HIDDEN_IMPORTS="$HIDDEN_IMPORTS --hidden-import=$module"
            done < _hidden_imports.txt
          fi
          echo "flags=$HIDDEN_IMPORTS" >> $GITHUB_OUTPUT

      - name: Create ICNS icon
        run: |
          mkdir -p app_icon.iconset
          sips -z 16 16     website/logo.png --out app_icon.iconset/icon_16x16.png
          sips -z 32 32     website/logo.png --out app_icon.iconset/icon_16x16@2x.png
          sips -z 32 32     website/logo.png --out app_icon.iconset/icon_32x32.png
          sips -z 64 64     website/logo.png --out app_icon.iconset/icon_32x32@2x.png
          sips -z 128 128   website/logo.png --out app_icon.iconset/icon_128x128.png
          sips -z 256 256   website/logo.png --out app_icon.iconset/icon_128x128@2x.png
          sips -z 256 256   website/logo.png --out app_icon.iconset/icon_256x256.png
          sips -z 512 512   website/logo.png --out app_icon.iconset/icon_256x256@2x.png
          sips -z 512 512   website/logo.png --out app_icon.iconset/icon_512x512.png
          sips -z 1024 1024 website/logo.png --out app_icon.iconset/icon_512x512@2x.png
          iconutil -c icns app_icon.iconset -o app_icon.icns
          echo "ICNS icon created successfully"

      - name: Verify Cython output
        run: |
          echo "=== Compiled .so files ==="
